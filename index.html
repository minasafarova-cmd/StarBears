<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, view-fit=cover, user-scalable=no">
    <title>StarBears — Telegram Stars Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-page); color: var(--text-primary);
            transition: background 0.3s ease, color 0.2s ease;
            padding-bottom: 85px; min-height: 100vh;
        }
        :root {
            --bg-page: #f5f7fb; --bg-surface: #ffffff; --card-bg: rgba(255,255,255,0.94);
            --border-light: rgba(224,230,240,0.7); --text-primary: #1c1e2a; --text-secondary: #6c7a8a;
            --accent: #007aff; --accent-glow: rgba(0,122,255,0.12); --success: #34c759;
            --warning: #ff9f0a; --danger: #ff3b30; --star: #ffb340;
            --shadow-sm: 0 8px 20px rgba(0,0,0,0.02),0 2px 6px rgba(0,0,0,0.05);
            --shadow-md: 0 12px 28px rgba(0,0,0,0.08); --tab-bar: rgba(255,255,255,0.96);
        }
        body.dark {
            --bg-page: #000000; --bg-surface: #121212; --card-bg: #1c1c1ecc;
            --border-light: #2c2c2e; --text-primary: #ffffff; --text-secondary: #8e8e93;
            --accent: #0a84ff; --accent-glow: rgba(10,132,255,0.2); --tab-bar: rgba(18,18,18,0.96);
            --shadow-sm: 0 8px 20px rgba(0,0,0,0.3); --shadow-md: 0 12px 28px rgba(0,0,0,0.5);
        }
        .bottom-tab-bar {
            position: fixed; bottom: 0; left: 0; right: 0; background: var(--tab-bar);
            backdrop-filter: blur(25px); border-top: 0.5px solid var(--border-light);
            display: flex; justify-content: space-around; padding: 8px 20px 18px; z-index: 100;
        }
        .tab-item {
            flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
            padding: 8px 0 4px; font-size: 12px; font-weight: 500; color: var(--text-secondary);
            border-radius: 32px; transition: all 0.2s; cursor: pointer;
        }
        .tab-item i { font-size: 24px; }
        .tab-item.active { color: var(--accent); background: var(--accent-glow); font-weight: 600; }
        .main-container { max-width: 560px; margin: 0 auto; padding: 20px 18px 30px; }
        .shop-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 28px; flex-wrap: wrap; }
        .shop-header h1 { font-size: 34px; font-weight: 800; background: linear-gradient(135deg,#FF9500,#FF3B30,#AF52DE); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .stars-badge { background: var(--bg-surface); padding: 8px 18px; border-radius: 40px; font-size: 15px; font-weight: 600; box-shadow: var(--shadow-sm); border: 0.5px solid var(--border-light); }
        .stars-badge i { color: var(--star); margin-right: 8px; }
        .products-grid { display: flex; flex-direction: column; gap: 18px; }
        .product-card {
            background: var(--card-bg); backdrop-filter: blur(12px); border-radius: 32px;
            padding: 18px 20px; display: flex; align-items: center; gap: 18px;
            box-shadow: var(--shadow-sm); border: 0.5px solid var(--border-light);
            transition: all 0.25s ease; animation: fadeSlideUp 0.4s ease;
        }
        @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .product-icon { font-size: 58px; width: 78px; text-align: center; }
        .product-info { flex: 1; }
        .product-name { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
        .stock-status { font-size: 13px; background: var(--bg-page); display: inline-block; padding: 4px 12px; border-radius: 40px; margin: 6px 0; }
        .price-tag { font-weight: 700; display: inline-flex; align-items: center; gap: 6px; background: var(--accent-glow); padding: 6px 14px; border-radius: 40px; color: var(--accent); }
        .buy-button {
            background: var(--accent); border: none; color: white; font-weight: 600;
            padding: 12px 22px; border-radius: 44px; font-size: 16px; cursor: pointer;
            transition: 0.2s; box-shadow: 0 4px 8px rgba(0,122,255,0.3); white-space: nowrap;
        }
        .buy-button:active { transform: scale(0.96); }
        .buy-button.disabled { background: #8e8e93; opacity: 0.6; pointer-events: none; box-shadow: none; }
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7);
            backdrop-filter: blur(16px); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .payment-modal {
            background: var(--bg-surface); border-radius: 48px; max-width: 340px; width: 100%;
            padding: 28px 24px; box-shadow: 0 30px 40px rgba(0,0,0,0.3);
            animation: scaleUp 0.25s ease; position: relative;
        }
        @keyframes scaleUp { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .payment-modal h3 { font-size: 28px; font-weight: 700; margin-bottom: 24px; text-align: center; }
        .payment-method {
            background: var(--bg-page); border-radius: 32px; padding: 16px; margin-bottom: 20px;
            display: flex; align-items: center; gap: 16px; cursor: pointer; border: 1px solid var(--border-light);
        }
        .payment-method.selected { border-color: var(--accent); background: var(--accent-glow); }
        .radio-circle { width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--text-secondary); }
        .payment-method.selected .radio-circle { border-color: var(--accent); background: var(--accent); box-shadow: inset 0 0 0 5px var(--bg-surface); }
        .method-icon { font-size: 32px; }
        .method-name { font-weight: 600; font-size: 18px; }
        .username-input {
            width: 100%; padding: 16px 18px; border-radius: 44px; border: 1px solid var(--border-light);
            background: var(--bg-page); color: var(--text-primary); font-size: 16px; margin-bottom: 24px;
        }
        .username-input:focus { outline: none; border-color: var(--accent); }
        .error-text { color: var(--danger); font-size: 13px; margin-top: -16px; margin-bottom: 16px; }
        .modal-buttons { display: flex; gap: 12px; }
        .modal-btn { flex: 1; padding: 14px; border-radius: 44px; font-weight: 600; border: none; background: var(--accent); color: white; cursor: pointer; }
        .modal-btn.cancel { background: var(--text-secondary); }
        .waiting-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px); border-radius: 48px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 20;
        }
        .spinner { width: 44px; height: 44px; border: 3px solid var(--border-light); border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .receipt-list { display: flex; flex-direction: column; gap: 16px; }
        .receipt-card {
            background: var(--card-bg); backdrop-filter: blur(12px); border-radius: 28px;
            padding: 18px; border-left: 5px solid var(--accent); box-shadow: var(--shadow-sm);
        }
        .receipt-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
        .receipt-name { font-weight: 800; font-size: 18px; }
        .receipt-status { padding: 4px 14px; border-radius: 40px; font-size: 12px; font-weight: 700; }
        .status-pending { background: var(--warning); color: #000; }
        .status-cancelled { background: var(--danger); color: white; }
        .status-delivered { background: var(--success); color: white; }
        .receipt-stars { font-weight: 700; color: var(--star); margin: 8px 0; }
        .receipt-username { font-size: 13px; background: var(--bg-page); display: inline-block; padding: 6px 14px; border-radius: 40px; margin-bottom: 10px; }
        .receipt-message { font-size: 13px; color: var(--text-secondary); background: var(--bg-page); padding: 14px; border-radius: 24px; margin-top: 12px; line-height: 1.4; }
        .receipt-date { font-size: 11px; color: var(--text-secondary); margin-top: 10px; }
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
        .settings-card {
            background: var(--card-bg); backdrop-filter: blur(12px); border-radius: 36px;
            padding: 28px; box-shadow: var(--shadow-sm); border: 0.5px solid var(--border-light);
        }
        .theme-row { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 0.5px solid var(--border-light); margin-bottom: 24px; }
        .toggle-switch { position: relative; display: inline-block; width: 52px; height: 28px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .slider-round { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: 0.2s; border-radius: 34px; }
        .slider-round:before { position: absolute; content: ""; height: 24px; width: 24px; left: 2px; bottom: 2px; background-color: white; transition: 0.2s; border-radius: 50%; }
        input:checked + .slider-round { background-color: var(--accent); }
        input:checked + .slider-round:before { transform: translateX(24px); }
        .admin-box { background: var(--bg-page); border-radius: 28px; padding: 18px; margin-bottom: 24px; }
        .admin-input-group { display: flex; gap: 12px; }
        .admin-input { flex: 1; padding: 14px 18px; border-radius: 44px; border: 1px solid var(--border-light); background: var(--bg-surface); }
        .admin-activate-btn { background: var(--accent); border: none; padding: 0 28px; border-radius: 44px; font-weight: 600; color: white; cursor: pointer; }
        .admin-panel { background: var(--bg-page); border-radius: 32px; padding: 20px; margin-top: 20px; border: 1px solid var(--accent); }
        .admin-title { font-weight: 800; font-size: 18px; margin-bottom: 18px; display: flex; gap: 8px; align-items: center; }
        .admin-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 14px; background: var(--bg-surface); padding: 12px 18px; border-radius: 60px; gap: 10px; }
        .stock-input { width: 110px; padding: 10px; border-radius: 40px; border: 1px solid var(--border-light); text-align: center; background: var(--bg-page); }
        .admin-save-btn { background: var(--success); border: none; padding: 8px 20px; border-radius: 40px; color: white; font-weight: 600; cursor: pointer; }
        .receipts-admin-list { margin-top: 20px; max-height: 400px; overflow-y: auto; }
        .admin-receipt-item { background: var(--bg-surface); border-radius: 24px; padding: 14px; margin-bottom: 12px; }
        .receipt-status-select { padding: 8px; border-radius: 30px; background: var(--bg-page); border: 1px solid var(--border-light); }
        .toast-message {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.85); backdrop-filter: blur(16px); color: white;
            padding: 12px 24px; border-radius: 60px; font-size: 14px; z-index: 1100;
            animation: fadeSlide 0.2s;
        }
        @keyframes fadeSlide { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        .hidden { display: none; }
        footer { text-align: center; font-size: 12px; color: var(--text-secondary); margin-top: 20px; }
        button { cursor: pointer; }
        @media (max-width: 480px) {
            .product-card { padding: 14px 16px; gap: 12px; }
            .product-icon { font-size: 48px; width: 60px; }
            .buy-button { padding: 10px 16px; font-size: 14px; white-space: normal; }
        }
    </style>
</head>
<body>
<div class="main-container">
    <div class="shop-header"><h1>🐻 StarBears</h1><div class="stars-badge"><i class="fas fa-star"></i> Telegram Stars</div></div>
    <div id="shopPanel" class="tab-panel"><div class="products-grid" id="productsGrid"></div></div>
    <div id="receiptsPanel" class="tab-panel" style="display: none;"><div id="receiptsList" class="receipt-list"></div></div>
    <div id="settingsPanel" class="tab-panel" style="display: none;">
        <div class="settings-card">
            <div class="theme-row"><span><i class="fas fa-moon"></i> Тёмная тема</span><label class="toggle-switch"><input type="checkbox" id="darkModeToggle"><span class="slider-round"></span></label></div>
            <div class="admin-box"><div class="admin-input-group"><input type="text" id="adminCodeInput" class="admin-input" placeholder="Код администратора"><button id="activateAdminBtn" class="admin-activate-btn">Активировать</button></div><div id="adminMessage" style="font-size:13px; margin-top:12px;"></div></div>
            <div id="adminPanelContainer" class="hidden"></div>
        </div>
        <footer>⭐ Оплата реальными Telegram Stars. По вопросам: @yecry</footer>
    </div>
</div>
<div class="bottom-tab-bar">
    <div class="tab-item" data-tab="shop"><i class="fas fa-store"></i><span>Магазин</span></div>
    <div class="tab-item" data-tab="receipts"><i class="fas fa-receipt"></i><span>Чеки</span></div>
    <div class="tab-item" data-tab="settings"><i class="fas fa-sliders-h"></i><span>Настройки</span></div>
</div>

<script>
    const BOT_TOKEN = "8881953646:AAFBCgqEWipdR-1wECRlrghV8GUDFPw0INE";
    const ADMIN_CHAT_ID = "6988238834";
    const tg = window.Telegram?.WebApp;
    if (tg) { tg.ready(); tg.expand(); tg.enableClosingConfirmation(); }

    const PRODUCTS = {
        bear: { id: 'bear', name: '🧸 Мишка', price: 13, icon: '🧸' },
        heart: { id: 'heart', name: '❤️ Сердечко', price: 13, icon: '❤️' },
        diamond: { id: 'diamond', name: '💎 Бриллиант', price: 97, icon: '💎' }
    };
    let stocks = { bear: 0, heart: 0, diamond: 0 };
    let purchases = [];
    let isAdmin = false;
    let pendingPayment = false; // защита от двойной оплаты

    function loadData() {
        const s = localStorage.getItem('starbears_stocks');
        if (s) stocks = JSON.parse(s); else stocks = { bear: 0, heart: 0, diamond: 0 };
        const p = localStorage.getItem('starbears_purchases');
        if (p) purchases = JSON.parse(p);
        const a = localStorage.getItem('starbears_admin');
        if (a === 'true') isAdmin = true;
    }
    function saveStocks() { localStorage.setItem('starbears_stocks', JSON.stringify(stocks)); }
    function savePurchases() { localStorage.setItem('starbears_purchases', JSON.stringify(purchases)); }
    function saveAdminFlag() { localStorage.setItem('starbears_admin', isAdmin); }

    async function notifyAdmin(productName, price, username, userId = null) {
        if (!ADMIN_CHAT_ID) return;
        const userInfo = userId ? `(user_id: ${userId})` : '';
        const message = `🌟 Новая покупка в StarBears!\n\nТовар: ${productName}\nСумма: ${price} ⭐\nПокупатель: ${username} ${userInfo}\nСтатус: оплачено успешно.`;
        try {
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: ADMIN_CHAT_ID, text: message })
            });
        } catch(e) { console.error(e); }
    }

    function addReceipt(productId, productName, price, username, payload) {
        const newReceipt = {
            id: Date.now() + Math.random(), productId, productName, price, username,
            date: new Date().toLocaleString('ru-RU'), status: "pending", invoicePayload: payload
        };
        purchases.unshift(newReceipt);
        savePurchases();
        renderReceipts();
        return newReceipt;
    }

    function updateReceiptStatus(receiptId, newStatus) {
        const idx = purchases.findIndex(r => r.id == receiptId);
        if (idx !== -1) { purchases[idx].status = newStatus; savePurchases(); renderReceipts(); renderAdminPanel(); }
    }

    async function createStarInvoice(product, username) {
        const title = `${product.name} — StarBears`;
        const description = `Покупка ${product.name} за ${product.price} ⭐. Username: ${username}. Выдача в течение 48 часов.`;
        const payload = `purchase_${product.id}_${Date.now()}_${username.replace('@','')}`;
        const prices = [{ label: product.name, amount: product.price }];
        try {
            const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/createInvoiceLink`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, description, payload, provider_token: "", currency: "XTR", prices, need_shipping_address: false })
            });
            const data = await response.json();
            if (data.ok && data.result) return { ok: true, invoiceLink: data.result, payload };
            else return { ok: false, error: data.description };
        } catch(err) { return { ok: false, error: err.message }; }
    }

    function finalizePurchase(product, username, payload, modalDiv, waitingDiv) {
        if (pendingPayment === false) return;
        if (stocks[product.id] <= 0) {
            showToast("Товар закончился, свяжитесь с @yecry");
            if (waitingDiv) waitingDiv.remove();
            pendingPayment = false;
            if (modalDiv) modalDiv.remove();
            return;
        }
        stocks[product.id]--;
        saveStocks();
        const receipt = addReceipt(product.id, product.name, product.price, username, payload);
        const userId = tg?.initDataUnsafe?.user?.id || null;
        notifyAdmin(product.name, product.price, username, userId);
        renderShop();
        showReceiptAfterPurchase(receipt);
        switchToTab('receipts');
        if (waitingDiv) waitingDiv.remove();
        pendingPayment = false;
        if (modalDiv) modalDiv.remove();
    }

    function showPaymentModal(product) {
        if (pendingPayment) { showToast("Подождите, предыдущий платёж обрабатывается"); return; }
        const existing = document.querySelector('.modal-overlay');
        if (existing) existing.remove();
        const modalDiv = document.createElement('div');
        modalDiv.className = 'modal-overlay';
        modalDiv.innerHTML = `
            <div class="payment-modal">
                <h3>Оплата</h3>
                <div class="payment-method selected" id="starsMethod">
                    <div class="radio-circle"></div>
                    <div class="method-icon"><i class="fas fa-star" style="color:var(--star);"></i></div>
                    <div class="method-name">Telegram Stars (${product.price} ⭐)</div>
                </div>
                <input type="text" id="usernameInput" class="username-input" placeholder="Ваш Telegram username (с @)" value="@">
                <div id="usernameError" class="error-text hidden"></div>
                <div class="modal-buttons">
                    <button id="confirmPayBtn" class="modal-btn">Оплатить</button>
                    <button id="cancelPayBtn" class="modal-btn cancel">Отмена</button>
                </div>
            </div>
        `;
        document.body.appendChild(modalDiv);
        const usernameField = document.getElementById('usernameInput');
        const errorDiv = document.getElementById('usernameError');

        document.getElementById('confirmPayBtn').onclick = async () => {
            if (pendingPayment) return;
            let username = usernameField.value.trim();
            if (!username.startsWith('@')) {
                errorDiv.innerText = 'Username должен начинаться с @';
                errorDiv.classList.remove('hidden'); return;
            }
            if (username.length < 2) {
                errorDiv.innerText = 'Введите корректный username';
                errorDiv.classList.remove('hidden'); return;
            }
            errorDiv.classList.add('hidden');
            if (stocks[product.id] <= 0) {
                showToast(`❌ ${product.name} закончился. Админ может добавить остатки.`);
                modalDiv.remove(); return;
            }
            pendingPayment = true;
            const waitingDiv = document.createElement('div');
            waitingDiv.className = 'waiting-overlay';
            waitingDiv.innerHTML = `<div class="spinner"></div><div style="color:white;">Ожидание оплаты...</div>`;
            modalDiv.querySelector('.payment-modal').appendChild(waitingDiv);
            showToast("⏳ Создание счёта...");
            const inv = await createStarInvoice(product, username);
            if (!inv.ok) {
                showToast(`Ошибка: ${inv.error}`);
                waitingDiv.remove(); pendingPayment = false; modalDiv.remove(); return;
            }
            if (tg && typeof tg.openInvoice === 'function') {
                tg.openInvoice(inv.invoiceLink);
                const invoiceHandler = (eventData) => {
                    if (eventData.status === 'paid') {
                        finalizePurchase(product, username, inv.payload, modalDiv, waitingDiv);
                    } else {
                        showToast(`Оплата не завершена (${eventData.status})`);
                        waitingDiv.remove(); pendingPayment = false; modalDiv.remove();
                    }
                    tg.offEvent('invoiceClosed', invoiceHandler);
                };
                tg.onEvent('invoiceClosed', invoiceHandler);
                // Без таймаута, только событие. Если событие не приходит - пользователь может выйти, но не висит.
            } else {
                // Fallback для окружений без WebApp
                window.open(inv.invoiceLink, '_blank');
                waitingDiv.innerHTML = `<div class="spinner"></div><div style="color:white;">Оплатите в открывшемся окне, затем нажмите кнопку</div>`;
                const manualBtn = document.createElement('button');
                manualBtn.innerText = "✅ Я оплатил";
                manualBtn.style.cssText = "background:var(--success); margin-top:12px; width:100%; padding:12px; border-radius:44px; border:none; color:white; font-weight:600; cursor:pointer;";
                const btnContainer = modalDiv.querySelector('.modal-buttons');
                btnContainer.appendChild(manualBtn);
                manualBtn.onclick = () => {
                    if (pendingPayment === false) return;
                    finalizePurchase(product, username, inv.payload, modalDiv, waitingDiv);
                };
            }
        };
        document.getElementById('cancelPayBtn').onclick = () => {
            if (pendingPayment) { showToast("Дождитесь завершения оплаты"); return; }
            modalDiv.remove();
        };
        usernameField.focus();
    }

    function showReceiptAfterPurchase(receipt) {
        const modalHtml = `<div style="position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.8); backdrop-filter:blur(16px); z-index:1100; display:flex; align-items:center; justify-content:center; padding:20px;" id="receiptModal">
            <div style="background:var(--bg-surface); border-radius:48px; max-width:340px; width:100%; padding:28px; text-align:center; box-shadow:0 30px 40px rgba(0,0,0,0.4);">
                <i class="fas fa-receipt" style="font-size:54px; color:var(--accent); margin-bottom:12px;"></i>
                <h3 style="margin-bottom:8px;">Чек №${receipt.id.toString().slice(-6)}</h3>
                <p style="font-weight:700;">${receipt.productName}</p>
                <p><i class="fas fa-star" style="color:var(--star);"></i> ${receipt.price} звезд</p>
                <p style="background:var(--bg-page); border-radius:40px; padding:8px; margin:12px 0;">${receipt.username}</p>
                <div style="background:var(--bg-page); border-radius:28px; padding:16px; margin:16px 0; font-size:13px; text-align:left;">
                    Здравствуйте, спасибо за покупку в StarBears!<br>
                    Пожалуйста, подождите ~48 часов, и мы выдадим вам товар.<br>
                    Если вам не пришла мишка, напишите админу (@yecry) с доказательствами.
                </div>
                <p style="font-size:12px;">Статус: <strong style="color:var(--warning);">На рассмотрении</strong></p>
                <button id="closeReceiptModal" style="background:var(--accent); border:none; padding:14px 28px; border-radius:44px; color:white; font-weight:600; margin-top:16px;">Отлично</button>
            </div>
        </div>`;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        document.getElementById('closeReceiptModal').onclick = () => document.getElementById('receiptModal').remove();
    }

    function renderShop() {
        const container = document.getElementById('productsGrid');
        if (!container) return;
        container.innerHTML = '';
        for (const [id, prod] of Object.entries(PRODUCTS)) {
            const stock = stocks[id];
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
                <div class="product-icon">${prod.icon}</div>
                <div class="product-info">
                    <div class="product-name">${prod.name}</div>
                    <div class="stock-status"><i class="fas fa-box"></i> В продаже: <strong>${stock}</strong> шт.</div>
                    <div class="price-tag"><i class="fas fa-star"></i> ${prod.price} звезд</div>
                </div>
                <button class="buy-button ${stock <= 0 ? 'disabled' : ''}" data-id="${id}">${stock > 0 ? 'Купить' : 'Нет в наличии'}</button>
            `;
            container.appendChild(card);
        }
        document.querySelectorAll('.buy-button:not(.disabled)').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const pid = btn.getAttribute('data-id');
                if (pid && stocks[pid] > 0) showPaymentModal(PRODUCTS[pid]);
            });
        });
    }

    function renderReceipts() {
        const container = document.getElementById('receiptsList');
        if (!container) return;
        if (purchases.length === 0) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-receipt" style="font-size:56px; opacity:0.6;"></i><p style="margin-top:12px;">У вас пока нет чеков</p><p style="font-size:13px;">Оплатите товар звездами</p></div>`;
            return;
        }
        container.innerHTML = purchases.map(r => {
            let statusText = '', statusClass = '';
            if (r.status === 'pending') { statusText = 'На рассмотрении'; statusClass = 'status-pending'; }
            else if (r.status === 'cancelled') { statusText = 'Отменено'; statusClass = 'status-cancelled'; }
            else if (r.status === 'delivered') { statusText = 'Выдан'; statusClass = 'status-delivered'; }
            return `<div class="receipt-card"><div class="receipt-header"><span class="receipt-name">${r.productName}</span><span class="receipt-status ${statusClass}">${statusText}</span></div><div class="receipt-stars"><i class="fas fa-star"></i> ${r.price} звезд</div><div class="receipt-username"><i class="fab fa-telegram"></i> ${r.username}</div><div class="receipt-message">Здравствуйте, спасибо за покупку в StarBears!<br>Пожалуйста, подождите ~48 часов, и мы выдадим вам товар.<br>Если вам не пришла мишка, напишите админу (@yecry) с доказательствами.</div><div class="receipt-date"><i class="far fa-clock"></i> ${r.date}</div></div>`;
        }).join('');
    }

    function renderAdminPanel() {
        const container = document.getElementById('adminPanelContainer');
        if (!container) return;
        if (!isAdmin) { container.classList.add('hidden'); container.innerHTML = ''; return; }
        container.classList.remove('hidden');
        let stocksHtml = `<div class="admin-panel"><div class="admin-title"><i class="fas fa-cubes"></i> Управление остатками</div>`;
        for (const [id, prod] of Object.entries(PRODUCTS)) {
            stocksHtml += `<div class="admin-row"><span>${prod.icon} ${prod.name}</span><input type="number" id="admin_stock_${id}" class="stock-input" value="${stocks[id]}" min="0"><button class="admin-save-btn" data-id="${id}">Обновить</button></div>`;
        }
        stocksHtml += `</div>`;
        let receiptsHtml = `<div class="admin-panel"><div class="admin-title"><i class="fas fa-list-ul"></i> Все чеки (управление статусами)</div><div class="receipts-admin-list">`;
        if (purchases.length === 0) receiptsHtml += `<p style="padding:12px;">Нет чеков</p>`;
        else {
            purchases.forEach(r => {
                receiptsHtml += `<div class="admin-receipt-item"><div><strong>${r.productName}</strong> — ${r.price} ⭐</div><div style="font-size:12px;">${r.username}</div><div style="font-size:11px;">${r.date}</div><div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;"><select data-id="${r.id}" class="receipt-status-select"><option value="pending" ${r.status === 'pending' ? 'selected' : ''}>На рассмотрении</option><option value="cancelled" ${r.status === 'cancelled' ? 'selected' : ''}>Отменено</option><option value="delivered" ${r.status === 'delivered' ? 'selected' : ''}>Выдан</option></select><button class="admin-save-status" data-id="${r.id}" style="background:var(--accent); border:none; padding:6px 20px; border-radius:40px; color:white; cursor:pointer;">Изменить</button></div></div>`;
            });
        }
        receiptsHtml += `</div></div>`;
        container.innerHTML = stocksHtml + receiptsHtml;
        for (const [id] of Object.entries(PRODUCTS)) {
            const btn = container.querySelector(`.admin-save-btn[data-id="${id}"]`);
            if (btn) btn.addEventListener('click', () => {
                const input = document.getElementById(`admin_stock_${id}`);
                let val = parseInt(input.value); if (isNaN(val)) val = 0;
                stocks[id] = Math.max(0, val); saveStocks(); renderShop(); renderAdminPanel();
                showToast(`Остаток ${PRODUCTS[id].name}: ${stocks[id]}`);
            });
        }
        document.querySelectorAll('.admin-save-status').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const rid = parseFloat(btn.getAttribute('data-id'));
                const select = document.querySelector(`.receipt-status-select[data-id="${rid}"]`);
                if (select) updateReceiptStatus(rid, select.value);
            });
        });
    }

    function switchToTab(tabName) {
        document.querySelectorAll('.tab-panel').forEach(p => p.style.display = 'none');
        if (tabName === 'shop') document.getElementById('shopPanel').style.display = 'block';
        if (tabName === 'receipts') document.getElementById('receiptsPanel').style.display = 'block';
        if (tabName === 'settings') document.getElementById('settingsPanel').style.display = 'block';
        document.querySelectorAll('.tab-item').forEach(tab => {
            tab.classList.remove('active');
            if (tab.getAttribute('data-tab') === tabName) tab.classList.add('active');
        });
        if (tabName === 'settings') renderAdminPanel();
    }

    function initTheme() {
        const saved = localStorage.getItem('starbears_theme');
        const prefersDark = tg && tg.colorScheme === 'dark';
        const isDark = saved === 'dark' || (saved === null && prefersDark);
        if (isDark) { document.body.classList.add('dark'); document.getElementById('darkModeToggle').checked = true; }
        else { document.body.classList.remove('dark'); document.getElementById('darkModeToggle').checked = false; }
    }
    function setDarkMode(enabled) {
        if (enabled) { document.body.classList.add('dark'); localStorage.setItem('starbears_theme', 'dark'); }
        else { document.body.classList.remove('dark'); localStorage.setItem('starbears_theme', 'light'); }
        if (tg) tg.setBackgroundColor(enabled ? '#000000' : '#ffffff');
    }
    function showToast(msg) {
        let t = document.querySelector('.toast-message'); if (t) t.remove();
        t = document.createElement('div'); t.className = 'toast-message'; t.innerText = msg;
        document.body.appendChild(t); setTimeout(() => t.remove(), 2500);
    }
    function activateAdmin() {
        const code = document.getElementById('adminCodeInput').value.trim();
        const msgDiv = document.getElementById('adminMessage');
        if (code === '2016Geydar') {
            if (!isAdmin) { isAdmin = true; saveAdminFlag(); renderAdminPanel(); msgDiv.innerHTML = '<span style="color:var(--success);">✅ Админ-панель активирована навсегда!</span>'; showToast('Админка разблокирована'); }
            else { msgDiv.innerHTML = '<span style="color:var(--accent);">⚠️ Админ-панель уже активна</span>'; }
        } else { msgDiv.innerHTML = '<span style="color:var(--danger);">❌ Неверный код</span>'; }
        setTimeout(() => { if (msgDiv) msgDiv.innerHTML = ''; }, 3000);
    }

    document.addEventListener('DOMContentLoaded', () => {
        loadData(); initTheme(); renderShop(); renderReceipts();
        if (isAdmin) renderAdminPanel();
        document.getElementById('darkModeToggle')?.addEventListener('change', e => setDarkMode(e.target.checked));
        document.getElementById('activateAdminBtn')?.addEventListener('click', activateAdmin);
        document.querySelectorAll('.tab-item').forEach(tab => {
            tab.addEventListener('click', () => switchToTab(tab.getAttribute('data-tab')));
        });
        switchToTab('shop');
    });
</script>
</body>
</html>
